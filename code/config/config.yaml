triage:
  llm_provider: anthropic       # anthropic | rules
  llm_model: claude-sonnet-4-6
  max_tokens: 1024
  top_k_retrieval: 5
  low_confidence_threshold: 0.10  # escalate if BM25 max score < this

paths:
  data_dir: data
  input_csv: support_tickets/support_tickets.csv
  output_csv: support_tickets/output.csv
  store_dir: ~/hackerrank_orchestrate/runs

logging:
  level: info   # info | debug | warn | error
